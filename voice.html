<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ถามด้วยเสียง — สิทธิถึงบ้าน</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="phone-outer">
    <div class="phone">

      <section id="screen-voice" class="screen active">
        <div class="status-bar">
          <span>00:00</span>
          <span>🔋 88%</span>
        </div>

        <header class="topbar">
          <button class="topbar__back" onclick="App.showScreen('screen-home')">← กลับ</button>
          <div class="topbar__title">ถามด้วยเสียง</div>
          <button onclick="App.openSettings()" style="background:none;border:none;cursor:pointer;font-size:1.5rem;line-height:1;padding:4px 6px;margin-left:auto;" aria-label="ตั้งค่า">⚙️</button>
        </header>

        <main class="content">
          <section class="voice-guide-card">
            <p class="voice-guide-card__title">กดปุ่มไมค์แล้วพูดได้เลย</p>
            <p class="voice-guide-card__desc">เช่น "ฉันอายุ 65 ปี อยากรู้ว่ามีสิทธิอะไรบ้าง"</p>
          </section>

          <div class="voice-visual">
            <div class="voice-wave" id="voiceWave">
              <div class="voice-wave__bar"></div>
              <div class="voice-wave__bar"></div>
              <div class="voice-wave__bar"></div>
              <div class="voice-wave__bar"></div>
              <div class="voice-wave__bar"></div>
            </div>

            <div class="mic-circle" id="micBtn" onclick="App.toggleMic()">🎙️</div>
            <p class="mic-status" id="micStatus">แตะเพื่อพูด</p>
          </div>

          <div class="transcript-box" id="transcriptBox">
            <span class="transcript-box__placeholder">
              ตัวอย่าง: "ฉันอายุ 65 ปี อยากรู้ว่าตัวเองมีสิทธิได้รับเงินอะไรบ้าง"
            </span>
          </div>

          <div class="ai-reply" id="voiceAnswer">
            กรุณากดปุ่มไมค์ แล้วระบบจะช่วยสรุปคำตอบให้คุณ
          </div>

          <div class="voice-actions">
            <button id="stopSpeakBtn" class="btn-secondary" onclick="App.stopSpeaking()">⏹ หยุดเสียง</button>
            <button class="btn-primary" onclick="App.showScreen('screen-volunteer')">🤝 ขอคนช่วย</button>
          </div>
        </main>

        <nav class="nav-bar">
          <button class="nav-item" onclick="App.showScreen('screen-home')">
            <span class="nav-item__icon">🏠</span>หน้าหลัก
          </button>
          <button class="nav-item" onclick="App.showScreen('screen-rights')">
            <span class="nav-item__icon">📋</span>สิทธิ
          </button>
          <button class="nav-item active" onclick="App.showScreen('screen-voice')">
            <span class="nav-item__icon">🎙️</span>พูด
          </button>
          <button class="nav-item" onclick="App.showScreen('screen-volunteer')">
            <span class="nav-item__icon">🤝</span>อาสา
          </button>
        </nav>
      </section>

    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const _orig = App.showScreen;
    const pageMap = {
      'screen-home':        'index.html',
      'screen-rights':      'rights.html',
      'screen-voice':       'voice.html',
      'screen-volunteer':   'volunteer.html',
      'screen-docs':        'docs.html',
      'screen-steps':       'steps.html',
      'screen-appointments':'appointments.html'
    };
    App.showScreen = function(id) {
      const page = pageMap[id];
      if (page && !document.getElementById(id)) { window.location.href = page; }
      else { _orig(id); }
    };
  </script>
</body>
</html>
